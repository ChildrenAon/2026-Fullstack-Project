<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium 3D Dice Roller</title>
  <meta name="description" content="고급스러운 3D 애니메이션을 제공하는 주사위 굴리기 웹 어플리케이션입니다.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Main Roller Panel -->
    <main class="panel main-panel">
      <div>
        <h1>3D DICE ROLLER</h1>
        <p class="subtitle">체감형 3D 주사위 시뮬레이터</p>
      </div>

      <!-- Controls -->
      <div class="controls-bar">
        <div class="control-group">
          <label for="diceCountSelect">주사위 개수</label>
          <select id="diceCountSelect">
            <option value="1">1개</option>
            <option value="2" selected>2개</option>
            <option value="3">3개</option>
            <option value="4">4개</option>
            <option value="5">5개</option>
            <option value="6">6개</option>
          </select>
        </div>
        <div class="control-group">
          <label for="diceThemeSelect">테마 색상</label>
          <select id="diceThemeSelect">
            <option value="theme-white">클래식 화이트</option>
            <option value="theme-purple" selected>일렉트릭 퍼플</option>
            <option value="theme-cyan">사이버 네온</option>
            <option value="theme-sunset">선셋 레드</option>
          </select>
        </div>
      </div>

      <!-- 3D Dice Viewport -->
      <div class="dice-viewport" id="diceViewport">
        <!-- Dice elements will be dynamically generated by JS -->
      </div>

      <!-- Roll Button -->
      <button class="roll-btn" id="rollBtn">ROLL DICE</button>
    </main>

    <!-- Sidebar Panel (Stats & History) -->
    <aside class="panel sidebar-panel">
      <!-- Stats -->
      <div class="stats-section">
        <h2>통계 (Statistics)</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-val" id="statTotalRolls">0</div>
            <div class="stat-lbl">총 굴린 횟수</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="statLastSum">0</div>
            <div class="stat-lbl">최근 눈금 합</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="statAverage">0.0</div>
            <div class="stat-lbl">평균 눈금</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="statHighestSum">0</div>
            <div class="stat-lbl">최고 기록 합</div>
          </div>
        </div>
      </div>

      <!-- History -->
      <div class="history-section">
        <h2>
          <span>기록 (History)</span>
          <button class="clear-btn" id="clearHistoryBtn">모두 비우기</button>
        </h2>
        <ul class="history-list" id="historyList">
          <!-- History items will be prepended by JS -->
        </ul>
      </div>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
